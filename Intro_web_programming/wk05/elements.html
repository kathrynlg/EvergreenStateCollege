<!DOCTYPE HTML>
<HTML lang = "en">
    <head>
        <meta charset="UTF-8">
        <script crossorigin src="https://unpkg.com/react@16/umd/react.development.js"></script>
        <script crossorigin src="https://unpkg.com/react-dom@16/umd/react-dom.development.js"> </script>
        <header>React Elements</header>
    </head>
    <body>

        <div id ="react-container-h1"></div>
        <div id ="react-button"></div>
        <div id ="react-container-h2"></div>
        <div id ="react-salmon"></div>
        
        <script>
            const element = React.createElement("h1", null, "React Elements!");
            ReactDOM.render(element, document.getElementById("react-container-h1"));
        </script>
        <script>
            const button = React.createElement(
                "button",{
                onClick: () => alert("button clicked")
                },
                "click me"
            );
            ReactDOM.render(button, document.getElementById("react-button"));
    </script>

        <script>
            const elementH2 = React.createElement("h2", null, "Baked Salmon");
            ReactDOM.render(elementH2, document.getElementById("react-container-h2"));
        </script>

        <script>
            const item = [
                "1 lb salmon",
                "1 cup Pine nuts",
                "2 cups Butter Lettuce",
                "1 Yellow squash",
                "1/2 cup olive oil",
                "3 cloves of garlic"

            ];

            const ingredients = React.createElement(
                "ul",
                {
                    className: "ingredients",
                },
                item.map((ingredient,i) =>
                    React.createElement("li", {key: i}, ingredient)
                )
            )
            ReactDOM.render(
                ingredients,
                document.getElementById("react-salmon")
            );
        </script>


    </body>

</html>
