<!DOCTYPE HTML>
<HTML lang = "en">
    <head>
        <meta charset="UTF-8">
        <script src="https://unpkg.com/babel-standalone@6.15.0/babel.min.js"></script>
    </head>
    <body>
        <h2>Arrays wk04</h2>

        <h2>Array 1</h2>
        <p id ="demo1"></p>
        <script type = "text/babel">
            const cars = ["Saab", "Volo",   "BMW"];
            document.getElementById("demo1").innerHTML = cars[2];
        </script>

        <h2>array 2</h2>
        <p id ="demo2"></p>
        <script type = "text/babel">
            const cars = ["Saab", "Volo", "BMW"];
            let car = cars[1];
            document.getElementById("demo2").innerHTML = car;
        </script>

        <h2>array 3</h2>
        <p id ="demo3"></p>
        <script type = "text/babel">
            const fruits = ["Banana", "orange", "Apple", "Grapes"];

            document.getElementById("demo3").innerHTML = fruits.toString();
        </script>

        <h2>array 4</h2>
        <p id ="demo4"></p>
        <script type = "text/babel">
            const fruits = ["Banana", "orange", "Apple", "Grapes"];
            let size = fruits.length;
            document.getElementById("demo4").innerHTML = size;
        </script>


    </body>

</html>
