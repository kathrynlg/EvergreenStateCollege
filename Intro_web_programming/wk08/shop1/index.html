<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MUI basic Shop 1</title>

        <!-- React and ReactDOM -->
        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

        <!-- Material-UI -->
        <script src="https://unpkg.com/@mui/material@5.15.10/umd/material-ui.production.min.js"></script>

        <!-- Babel for JSX -->
        <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

        <!-- CSS insert -->
        <link rel="stylesheet" href="css/default.css">

    </head>
    <body>


    <div id="root"></div>

    <script type="text/babel">
        const { AppBar, Toolbar, Typography, Button, Container, Box, CssBaseline, Grid, Card, CardContent, CardActions } = MaterialUI;

        //Navbar Comp
        function Navbar() {
            return (
                <AppBar position="static">
                    <Toolbar>
                        <Typography variant="nav1" sx={{ flexGrow: 1}}>
                            My MUI Shop1
                        </Typography>
                        <Button color="inherit">Home</Button>
                        <Button color="inherit">Products</Button>
                        <Button color="inherit">About Us</Button>
                    </Toolbar>
                </AppBar>
                );
        }

        //Hero Sction Comp
        function HeroSection(){
            return (
                <Box className="hero-section" textAlign="center">
                    <Typography variant="h1" gutterBottom>
                        Welcome to my MUI Shop1
                    </Typography>
                    <Typography variant="body1" color="textSecondary" gutterBottom>
                        This is a simple homepage using React & Material-UI
                    </Typography>
                    <Box display="block" mt={2}>
                        <Button variant="contained" color="primary" size="large">
                            Get Started
                        </Button>
                    </Box>
                </Box>
            );
        }

        //Feature Cards HeroSection
        function FeatureCards(){
            return (
                <Container className="card-container">
                    <Grid container spacing={4} justifyContent="center">
                        
                        <Grid item xs={12} sm={6} md={4}>
                            <Card>
                                <CardContent>
                                    <Typography variant="h2" component="div">
                                        Feature 1
                                    </Typography>
                                    <Typography variant="body2"color="textSecondary">
                                        This is the deiscription of the first feature.
                                    </Typography>
                                </CardContent>
                                <CardActions>
                                    <Button size="small" color="primary">
                                        Learn More
                                    </Button>
                                </CardActions>
                            </Card>
                        </Grid>

                        <Grid item xs={12} sm={6} md={4}>
                            <Card>
                                <CardContent>
                                    <Typography variant="h2" component="div">
                                        Feature 2
                                    </Typography>
                                    <Typography variant="body2"color="textSecondary">
                                        This is the deiscription of the second feature.
                                    </Typography>
                                </CardContent>
                                <CardActions>
                                    <Button size="small" color="primary">
                                        Learn More
                                    </Button>
                                </CardActions>
                            </Card>
                        </Grid>
                        
                        <Grid item xs={12} sm={6} md={4}>
                            <Card>
                                <CardContent>
                                    <Typography variant="h2" component="div">
                                        Feature 3
                                    </Typography>
                                    <Typography variant="body2"color="textSecondary">
                                        This is the deiscription of the third feature.
                                    </Typography>
                                </CardContent>
                                <CardActions>
                                    <Button size="small" color="primary">
                                        Learn More
                                    </Button>
                                </CardActions>
                            </Card>
                        </Grid>

                    </Grid>
                </Container>
            );
        }

        //Contact Us HeroSection
        function ContactUs() {
            return(
                <Box className="contact-section" textAlign="center">
                    <Typography variant="h2" gutterBottom>
                        Contact Us
                    </Typography>
                    <Typography variant="body1" color="textSecondary" gutterBottom>
                        We'd love to hear from you! Get in touch for any questions
                    </Typography>
                    <Box display="block" mt={12}>
                        <Button variant="contained" color="primary" size="large">
                            Contact Us
                        </Button>
                    </Box>
                </Box>
            );
        }

        //Footer Comp
        function Footer(){
            return(
                <Box className="footer" textAlign="center" py={2} bgcolor="primary.main" color="white">
                    <Typography variant="nav1">&copy; 2025 My thingy homepage <br /></Typography>
                    <Typography variant="nav1">All Rights Reserved.</Typography>
                </Box>
            );
        }

        //Main App Comp
        function App(){
            return(
                <React.Fragment> 
                    <CssBaseline />
                    <Navbar />
                    <HeroSection />
                    <FeatureCards />
                    <ContactUs />
                    <Footer />
                </React.Fragment>
            );
        }


        //render the React App
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    </script>
 
    </body>



</html>
