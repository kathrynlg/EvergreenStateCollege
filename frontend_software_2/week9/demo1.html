<!DOCTYPE html>
<html lang="en">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/element-plus@2.5.6/dist/index.css">  
    <head>
          <title>Vue + Element Plus Demo1</title>
    </head>
	<body>
        <h1>Vue + Element Plus Demo1</h1>

        <div id="app">
            <el-button type="primary" @click="visable=true">Open Dialog</el-button>
            <el-dialog v-model="visable" title="Hello">
            </el-dialog>
        </div>
<!-- script 1 -->
        <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
<!-- script 2 -->
        <script src="https://unpkg.com/element-plus@2.5.6/dist/index.full.js"></script>
        <script>
            const {createApp, ref} = Vue
            createApp({
                setup() {
                    const visable = ref(false)
                    return {visable}
                }
            })

            .use(ElementPlus)
            .mount('#app')

            </script>


    </body>

</html>
